<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" fill="none" role="img" aria-label="Three access modes converging onto one unified storage platform">
  <style>
    svg { color-scheme: light dark; --ink: 228, 230, 238; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }
    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

    .s-title  { fill: #f7941d; font-size: 16px; font-weight: 700; letter-spacing: 0.03em; }
    .s-sub    { fill: rgba(var(--ink), 0.55); font-size: 11px; font-weight: 500; }
    .s-mode   { fill: rgba(var(--ink), 0.90); font-size: 13px; font-weight: 700; }
    .s-tag    { fill: rgba(var(--ink), 0.55); font-size: 9.5px; font-weight: 600; }
    .s-hub-t  { fill: #f7941d; font-size: 14px; font-weight: 800; }
    .s-hub-s  { fill: rgba(var(--ink), 0.62); font-size: 10px; font-weight: 500; }
    .s-stat   { fill: rgba(var(--ink), 0.92); font-size: 14px; font-weight: 800; }
    .s-stat-l { fill: rgba(var(--ink), 0.50); font-size: 9px; font-weight: 600; letter-spacing: 0.04em; }

    .s-card   { fill: rgba(var(--ink), 0.04); stroke: rgba(var(--ink), 0.15); stroke-width: 1; }
    .s-hub    { fill: rgba(247,148,29,0.08); stroke: #f7941d; stroke-width: 1.4; }
    .s-chip   { fill: rgba(var(--ink), 0.06); stroke: rgba(var(--ink), 0.16); stroke-width: 0.8; }
    .s-wire   { stroke: rgba(247,148,29,0.55); stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-dasharray: 5 4; animation: sFlow 0.8s linear infinite; }
    .s-dot    { fill: #f7941d; }
    @keyframes sFlow { to { stroke-dashoffset: -18; } }
  </style>

  <!-- Header -->
  <text class="s-title" x="40" y="34">Three Access Modes, One Unified Storage Platform</text>
  <text class="s-sub"   x="40" y="54">Block, File, and Object converge onto a single NVMe cluster — no storage silos</text>

  <!-- ── Access mode cards (left) ── -->
  <rect class="s-card" x="40" y="84"  width="244" height="80" rx="12" />
  <text class="s-mode" x="60" y="116">Block Raw Device</text>
  <rect class="s-chip" x="60"  y="130" width="40" height="20" rx="10" /><text class="s-tag" x="80"  y="144" text-anchor="middle">VM</text>
  <rect class="s-chip" x="106" y="130" width="62" height="20" rx="10" /><text class="s-tag" x="137" y="144" text-anchor="middle">K8s CSI</text>
  <rect class="s-chip" x="174" y="130" width="38" height="20" rx="10" /><text class="s-tag" x="193" y="144" text-anchor="middle">DB</text>

  <rect class="s-card" x="40" y="176" width="244" height="80" rx="12" />
  <text class="s-mode" x="60" y="208">Standard File Access</text>
  <rect class="s-chip" x="60"  y="222" width="46" height="20" rx="10" /><text class="s-tag" x="83"  y="236" text-anchor="middle">NFS</text>
  <rect class="s-chip" x="112" y="222" width="48" height="20" rx="10" /><text class="s-tag" x="136" y="236" text-anchor="middle">SMB</text>
  <rect class="s-chip" x="166" y="222" width="62" height="20" rx="10" /><text class="s-tag" x="197" y="236" text-anchor="middle">POSIX</text>

  <rect class="s-card" x="40" y="268" width="244" height="80" rx="12" />
  <text class="s-mode" x="60" y="300">S3 Object Storage</text>
  <rect class="s-chip" x="60"  y="314" width="48" height="20" rx="10" /><text class="s-tag" x="84"  y="328" text-anchor="middle">S3 API</text>
  <rect class="s-chip" x="114" y="314" width="54" height="20" rx="10" /><text class="s-tag" x="141" y="328" text-anchor="middle">HTTPS</text>
  <rect class="s-chip" x="174" y="314" width="74" height="20" rx="10" /><text class="s-tag" x="211" y="328" text-anchor="middle">Datasets</text>

  <!-- ── Converging wires ── -->
  <path class="s-wire" d="M284 124 C 360 124, 380 216, 452 216" />
  <path class="s-wire" d="M284 216 C 370 216, 380 216, 452 216" />
  <path class="s-wire" d="M284 308 C 360 308, 380 216, 452 216" />
  <circle class="s-dot" cx="452" cy="216" r="3.5" />

  <!-- ── Unified storage hub (right) ── -->
  <rect class="s-hub" x="456" y="120" width="264" height="192" rx="14" />
  <text class="s-hub-t" x="588" y="152" text-anchor="middle">Unified Storage Cluster</text>
  <text class="s-hub-s" x="588" y="172" text-anchor="middle">Pascari NVMe SSD · 3-node</text>
  <rect class="s-chip" x="478" y="186" width="100" height="22" rx="11" /><text class="s-tag" x="528" y="201" text-anchor="middle">EC 2+1 Erasure</text>
  <rect class="s-chip" x="586" y="186" width="116" height="22" rx="11" /><text class="s-tag" x="644" y="201" text-anchor="middle">Auto Rebalancing</text>
  <rect class="s-chip" x="478" y="216" width="120" height="22" rx="11" /><text class="s-tag" x="538" y="231" text-anchor="middle">Per-volume Policy</text>
  <rect class="s-chip" x="606" y="216" width="96" height="22" rx="11" /><text class="s-tag" x="654" y="231" text-anchor="middle">Snapshots</text>

  <!-- hub stats -->
  <text class="s-stat"   x="510" y="276" text-anchor="middle">~460 TB</text>
  <text class="s-stat-l" x="510" y="292" text-anchor="middle">USABLE</text>
  <text class="s-stat"   x="590" y="276" text-anchor="middle">~20 GB/s</text>
  <text class="s-stat-l" x="590" y="292" text-anchor="middle">READ BW</text>
  <text class="s-stat"   x="668" y="276" text-anchor="middle">~33K</text>
  <text class="s-stat-l" x="668" y="292" text-anchor="middle">IOPS</text>

  <!-- Note -->
  <text class="s-sub" x="400" y="392" text-anchor="middle" style="font-style:italic">EC 2+1 tolerates simultaneous SSD &amp; node failures · 66% usable efficiency vs 3-way replication</text>
</svg>
